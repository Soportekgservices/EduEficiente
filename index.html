        async function loadGroupReportData(schoolId) {
            const gradeId = document.getElementById('selReportGrade').value;
            const container = document.getElementById('groupReportContent');
            if(!gradeId) return;

            container.innerHTML = `<div class="empty-msg"><i class="fa-solid fa-circle-notch fa-spin"></i> Calculando métricas...</div>`;

            // Paso 1: Obtener los estudiantes del grado y colegio (Evita el error de schema cache)
            const { data: students, error: studentError } = await _s.from('testudiantes')
                .select('id, nombre')
                .eq('id_grado', gradeId)
                .eq('id_colegio', schoolId);

            if(studentError) {
                console.error("Error al buscar estudiantes:", studentError);
                container.innerHTML = `<p class="empty-msg" style="color:var(--danger);">Error al identificar estudiantes: ${studentError.message}</p>`;
                return;
            }

            if(!students || students.length === 0) {
                container.innerHTML = `<p class="empty-msg">No hay estudiantes registrados en este grado.</p>`;
                return;
            }

            const studentIds = students.map(s => s.id);
            const studentMap = Object.fromEntries(students.map(s => [s.id, s.nombre]));

            // Paso 2: Obtener los resultados para esos estudiantes específicos
            const { data, error } = await _s.from('tresultados')
                .select('respuestas, id_estudiante')
                .in('id_estudiante', studentIds);

            if(error) {
                console.error("Error al cargar resultados:", error);
                container.innerHTML = `<p class="empty-msg" style="color:var(--danger);">Error al cargar resultados: ${error.message}</p>`;
                return;
            }

            if(!data || data.length === 0) {
                container.innerHTML = `<p class="empty-msg">No hay suficientes datos para generar un reporte en este grado.</p>`;
                return;
            }

            // --- Lógica de Procesamiento Profundo (Multipage Report) ---
            const areaTotals = {}; const areaCounts = {};
            const studentsByArea = {}; // Listado de nombres por área dominante
            const interestLevels = { Alto: 0, Medio: 0, Bajo: 0 };
            let highScoresSum = 0; let studentsAtRisk = 0;

            // Inicializar estructuras de datos
            Object.keys(AREAS_VOCACIONALES).forEach(a => {
                areaTotals[a] = 0; areaCounts[a] = 0; studentsByArea[a] = [];
            });

            data.forEach(r => {
                try {
                    const res = typeof r.respuestas === 'string' ? JSON.parse(r.respuestas) : (r.respuestas || {});
                    let studentMax = -1;
                    let dominantArea = "";

                    Object.entries(res).forEach(([area, val]) => {
                        if (typeof val === 'number') {
                            areaTotals[area] += val;
                            areaCounts[area]++;
                            if(val > studentMax) { studentMax = val; dominantArea = area; }
                        }
                    });

                    if(dominantArea) studentsByArea[dominantArea].push(studentMap[r.id_estudiante] || 'Estudiante');

                    highScoresSum += studentMax;
                    if(studentMax >= 75) interestLevels.Alto++;
                    else if(studentMax >= 40) interestLevels.Medio++;
                    else { interestLevels.Bajo++; studentsAtRisk++; }
                } catch(e) { console.error("Error procesando respuestas:", e); }
            });

            const averages = Object.keys(areaTotals).map(area => ({
                area,
                score: Math.round(areaTotals[area] / (areaCounts[area] || 1))
            })).sort((a,b) => b.score - a.score);

            if(!averages.length) {
                container.innerHTML = `<p class="empty-msg">Los resultados encontrados no contienen datos de áreas válidos.</p>`;
                return;
            }

            const topArea = averages[0]?.area || "N/A";
            const avgMaturity = Math.round(highScoresSum / (data.length || 1));
            const maturityLabel = avgMaturity > 70 ? "Alta" : (avgMaturity > 45 ? "Media" : "En Desarrollo");
            const riskPercent = Math.round((studentsAtRisk / (data.length || 1)) * 100);
            const recommendedCareers = AREAS_VOCACIONALES[topArea]?.carreras.slice(0, 5) || [];

            container.innerHTML = `
                <div id="fullStrategicReport" style="background:white; color:#333; font-family:'Outfit', sans-serif;">
                    <!-- PÁGINA 1: PORTADA Y RESUMEN -->
                    <div class="report-page" style="padding:40px; min-height:1000px; border-bottom:2px solid #eee;">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid var(--primary); padding-bottom:20px; margin-bottom:40px;">
                            <div>
                                <h1 style="font-size:2.2rem; color:var(--primary); margin:0;">INFORME ESTRATÉGICO GRUPAL</h1>
                                <p style="font-size:1.1rem; color:var(--secondary);">Informe Grupal | Gestión Institucional</p>
                                <p style="font-weight:600; margin-top:5px;">Grado: ${document.getElementById('selReportGrade').options[document.getElementById('selReportGrade').selectedIndex].text}</p>
                            </div>
                            <button class="btn-main" style="width:auto; padding:12px 25px;" onclick="exportGroupPDF()">Descargar PDF Completo</button>
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; margin-bottom:40px;">
                            <div class="card" style="text-align:center; padding:20px; background:#f8fafc; border-radius:15px;"><small>Población</small><strong style="display:block; font-size:2rem; color:var(--primary);">${data.length}</strong></div>
                            <div class="card" style="text-align:center; padding:20px; background:#f8fafc; border-radius:15px; border-bottom:4px solid var(--success);"><small>Área Top</small><strong style="display:block; font-size:1rem; color:var(--success);">${topArea}</strong></div>
                            <div class="card" style="text-align:center; padding:20px; background:#f8fafc; border-radius:15px;"><small>Madurez</small><strong style="display:block; font-size:1.5rem; color:var(--accent);">${maturityLabel}</strong></div>
                            <div class="card" style="text-align:center; padding:20px; background:#f8fafc; border-radius:15px; border-bottom:4px solid var(--danger);"><small>Riesgo</small><strong style="display:block; font-size:2rem; color:var(--danger);">${riskPercent}%</strong></div>
                        </div>
                        <h2 style="color:var(--primary); border-left:5px solid var(--accent); padding-left:15px; margin-bottom:20px;">1. Resumen Ejecutivo</h2>
                        <div style="background:#f1f5f9; padding:25px; border-radius:15px; line-height:1.8; text-align:justify;">
                            El presente análisis para el grado seleccionado revela una tendencia marcada hacia el área de <strong>${topArea}</strong>. Con un nivel de madurez vocacional calificado como <strong>${maturityLabel}</strong>, el grupo demuestra una capacidad ${avgMaturity > 50 ? 'sólida' : 'en proceso'} para identificar sus intereses. Sin embargo, se observa un <strong>${riskPercent}%</strong> de estudiantes en riesgo de indecisión.

function todayLocalISODate() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

/** Resuelve id_grupo según la FK real entre testudiantes y tusuario (varía por esquema). */
async function fetchStudentGroupId() {
    if (!sess?.id) return null;
    const { data, error } = await _s.from('testudiantes').select('id_grupo').eq('id', sess.id).maybeSingle();
    if (error) {
        console.warn('fetchStudentGroupId', error);
        return null;
    }
    return data?.id_grupo || null;
}

function renderStudentBlocked(title, message) {
    document.getElementById('dynamicBoard').innerHTML = `
        <div class="card span-6" style="text-align:center; padding:40px; max-width:640px; margin:0 auto;">
            <i class="fa-solid fa-calendar-xmark" style="font-size:3rem; color:var(--secondary); margin-bottom:20px;"></i>
            <h2 style="margin-bottom:15px;">${esc(title)}</h2>
            <p style="color:var(--secondary); line-height:1.6;">${esc(message)}</p>
            <button class="btn-main" style="width:auto; margin-top:28px;" onclick="logout()">Cerrar sesión</button>
        </div>`;
    setTimeout(() => { refreshNotifBadges(); }, 0);
}

async function viewStudent() {
    document.getElementById('roleMenu').innerHTML = `
        <li class="nav-item active"><i class="fa-solid fa-pen-to-square"></i> Mi evaluación <span id="navBadgeStudent"></span></li>
        <li class="nav-item" onclick="consultarResultado()" style="color: var(--success);"><i class="fa-solid fa-chart-line"></i> Consultar mi resultado</li>`;

    document.getElementById('pageTitle').innerText = "Mi Prueba Vocacional";
    document.getElementById('pageDesc').innerText = "Acceso según calendario aprobado por tu institución.";

    const idGrupo = await fetchStudentGroupId();
    if (!idGrupo) {
        renderStudentBlocked(
            "Sin grupo asignado",
            "Tu usuario no aparece vinculado a un grupo en el sistema. Verifica que la carga masiva haya registrado tu documento correctamente o contacta a tu colegio."
        );
        return;
    }

    // Verificar si el estudiante ya tiene un resultado guardado
    const { data: resultDone } = await _s.from('tresultados').select('id').eq('id_estudiante', sess.id).maybeSingle();
    if (resultDone) {
        document.getElementById('dynamicBoard').innerHTML = `
            <div class="card span-6" style="text-align:center; padding:50px; max-width:650px; margin:40px auto; border: 2.5px solid var(--success); background: #f0fdf4;">
                <i class="fa-solid fa-circle-check" style="font-size:4.5rem; color:var(--success); margin-bottom:25px;"></i>
                <h1 style="color:var(--primary); margin-bottom:15px; font-weight:800;">¡Felicitaciones!</h1>
                <p style="font-size:1.15rem; color:var(--secondary); margin-bottom:30px; line-height:1.6;">
                    Ya has realizado tu test de evaluación vocacional satisfactoriamente.
                </p>
                <button class="btn-main" style="width:auto; padding:18px 40px; background:var(--success); font-size:1.1rem;" onclick="consultarResultado()">
                    <i class="fa-solid fa-chart-line"></i> Consultar mi resultado aquí
                </button>
            </div>`;
        refreshNotifBadges();
        return;
    }

    // Obtener datos del grupo, colegio y grado
    const { data: groupData, error: gErr } = await _s.from('tgrupos')
        .select('nombre, id_colegio, tgrados (nombre), tcolegios (nombre)')
        .eq('id', idGrupo)
        .single();

    if (gErr || !groupData) {
        renderStudentBlocked(
            "Error en datos del grupo",
            "No se pudieron cargar los datos de tu colegio, grado o grupo."
        );
        return;
    }

    const colegioNombre = groupData.tcolegios?.nombre || 'Desconocido';
    const gradoNombre = groupData.tgrados?.nombre || 'Desconocido';
    const grupoNombre = groupData.nombre || 'Desconocido';

    const { count: pendCola } = await _s.from('tsolicitudes_aplicacion').select('*', { count: 'exact', head: true }).eq('id_grupo', idGrupo).eq('estado', 'pendiente');

    const today = todayLocalISODate();
    const { data: sols, error: sErr } = await _s.from('tsolicitudes_aplicacion')
        .select('id_prueba, fecha_inicio, fecha_fin')
        .eq('id_grupo', idGrupo)
        .eq('estado', 'aprobada')
        .lte('fecha_inicio', today)
        .gte('fecha_fin', today)
        .order('id', { ascending: false })
        .limit(1);

    if (sErr) {
        console.error(sErr);
        renderStudentBlocked(
            "No se pudo verificar el acceso",
            "Error al consultar el calendario de evaluaciones: " + (sErr.message || "desconocido") + ". Si acabas de crear la tabla, ejecuta el SQL de políticas RLS en Supabase."
        );
        return;
    }

    if (!sols?.length) {
        if ((pendCola || 0) > 0) {
            renderStudentBlocked(
                "Evaluación en revisión",
                "Tu institución ya envió una solicitud para aplicar la evaluación a tu grupo. Aún está pendiente de aprobación por el administrador del sistema. Cuando sea aprobada y la fecha actual esté dentro de la ventana configurada, podrás presentar la prueba aquí."
            );
            return;
        }
        renderStudentBlocked(
            "Evaluación no disponible por fechas",
            "No hay una aplicación de prueba aprobada y vigente para tu grupo hoy. Debe existir una solicitud aprobada por el administrador y la fecha actual debe estar entre la fecha inicial y la fecha final configuradas."
        );
        return;
    }

    const idPrueba = sols[0].id_prueba;
    const { data: qData, error } = await _s.from('tpreguntas').select('*').eq('id_prueba', idPrueba).order('num_pregunta', { ascending: true });

    if (error || !qData?.length) {
        renderStudentBlocked(
            "Contenido no disponible",
            "La prueba asignada aún no tiene preguntas cargadas. Contacta al administrador del sistema."
        );
        return;
    }

    document.getElementById('pageTitle').innerText = `Mi Prueba Vocacional - ${colegioNombre}`;
    document.getElementById('pageDesc').innerText = `Grado: ${gradoNombre} | Grupo: ${grupoNombre} | Ventana autorizada: del ${sols[0].fecha_inicio} al ${sols[0].fecha_fin}.`;

    dynamicQuestions = qData;
    answers = new Array(dynamicQuestions.length).fill(null);
    step = 0;
    renderStudentTest();
    refreshNotifBadges();
}

function renderStudentTest() {
    const q = dynamicQuestions[step];
    const progress = Math.round((step / dynamicQuestions.length) * 100);
    
    // Generamos las opciones dinámicas (opt1 a opt5)
    let optsHtml = '';
    for(let i=1; i<=5; i++) {
        const text = q[`opt${i}`];
        if(text && text.trim() !== "") {
            optsHtml += `
                <div class="likert-option">
                    <input type="radio" name="qs" id="o${i}" ${answers[step] === i ? 'checked' : ''} onclick="setR(${i})">
                    <label for="o${i}">${text}</label>
                </div>`;
        }
    }

    document.getElementById('dynamicBoard').innerHTML = `
        <div class="span-6 test-container">
            <div class="progress-container"><div class="progress-bar" style="width: ${progress}%"></div></div>
            <div class="question-card">
                <span style="font-weight:700; color:var(--accent);">PREGUNTA ${q.num_pregunta} DE ${dynamicQuestions.length}</span>
                <h2 style="margin-top:10px;">${q.enunciado}</h2>
                <div class="likert">${optsHtml}</div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <button class="btn-main" style="width:160px; background:var(--secondary);" onclick="nav(-1)" ${step === 0 ? 'disabled' : ''}>Anterior</button>
                ${step < dynamicQuestions.length - 1 
                    ? `<button class="btn-main" style="width:160px;" onclick="nav(1)">Siguiente</button>`
                    : `<button class="btn-main" style="width:180px; background:var(--success);" onclick="finish()">Finalizar</button>`
                }
            </div>
        </div>`;
}

function setR(v) { 
    answers[step] = v; 
    setTimeout(() => { if(step < dynamicQuestions.length -1) nav(1); else renderStudentTest(); }, 300);
}

function nav(d) { 
    if(d > 0 && answers[step] === null) return alert("Elige una respuesta.");
    step += d; 
    window.scrollTo(0,0); 
    renderStudentTest(); 
}

async function finish() {
    if(answers.includes(null)) return alert("Completa todas las preguntas.");
    
    const scores = {};
    const maxScores = {};

    dynamicQuestions.forEach((q, i) => {
        const area = q.area; // Nombre completo del área
        if(!scores[area]) { scores[area] = 0; maxScores[area] = 0; }
        scores[area] += answers[i];
        maxScores[area] += 5;
    });

    const results = {};
    Object.keys(scores).forEach(a => results[a] = Math.round((scores[a] / maxScores[a]) * 100));
    const dominant = Object.keys(results).reduce((a, b) => results[a] > results[b] ? a : b);

    const { error } = await _s.from('tresultados').insert([{ 
        id_estudiante: sess.id, 
        id_prueba: dynamicQuestions[0].id_prueba, 
        totalpreg: dynamicQuestions.length, 
        respuestas: JSON.stringify(results),
        estado: 'Finalizado'
    }]);

    if(error) alert("Error: " + error.message);
    else { alert("¡Test Finalizado! Pronto podrás observar tus resultados."); logout(); }
}
