<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHASIDE Neo-Horizon | Vocacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2D3250; --accent: #F6B17A; --secondary: #7077A1; --bg: #F4F7FB; --white: #ffffff; --success: #46B4A8; --shadow: 0 10px 40px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #1A1C2C; overflow-x: hidden; }
        .view-section { display: none; min-height: 100vh; }
        .view-section.active { display: flex; }
        .login-screen { align-items: center; justify-content: center; background: radial-gradient(circle at top right, #f6b17a15, transparent), var(--bg); }
        .login-card { background: var(--white); padding: 50px; border-radius: 35px; box-shadow: var(--shadow); width: 100%; max-width: 450px; text-align: center; }
        .login-card h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 30px; color: var(--primary); letter-spacing: -1.5px; }
        .input-box { text-align: left; margin-bottom: 20px; }
        .input-box label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--secondary); }
        .input-box select, .input-box input { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #E2E8F0; background: #F8FAFC; font-family: inherit; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: var(--accent); transform: translateY(-3px); }
        .app-container { display: none; width: 100%; }
        .sidebar { width: 260px; background: var(--primary); min-height: 100vh; padding: 40px 20px; position: fixed; color: white; }
        .sidebar h2 { color: var(--accent); margin-bottom: 40px; text-align: center; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #ADB3D2; margin-bottom: 5px; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .bento-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }
        .card { background: var(--white); border-radius: 25px; padding: 25px; box-shadow: var(--shadow); }
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; } .span-6 { grid-column: span 6; }
        .stat-num { font-size: 2.5rem; font-weight: 800; color: var(--primary); display: block; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th { text-align: left; padding: 12px; color: var(--secondary); font-size: 0.7rem; border-bottom: 1px solid #eee; }
        .data-table td { padding: 15px 12px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .toggle-btn { width: 40px; height: 20px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; }
        .toggle-btn.active { background: var(--success); }
        .toggle-btn::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-btn.active::after { left: 22px; }
    </style>
</head>
<body>

    <section id="loginView" class="view-section active login-screen">
        <div class="login-card">
            <h1>CHASIDE</h1>
            <div class="input-box">
                <label>Documento</label>
                <select><option>Cédula de Ciudadanía</option><option>Tarjeta de Identidad</option></select>
            </div>
            <div class="input-box">
                <label>Número</label>
                <input type="text" id="loginId" placeholder="Ingresa tu ID">
            </div>
            <button class="btn-main" onclick="authGate()">Ingresar al Sistema</button>
        </div>
    </section>

    <div id="appContainer" class="app-container">
        <aside class="sidebar">
            <h2 id="roleBrand">NEO.CHASIDE</h2>
            <nav id="roleMenu"></nav>
        </aside>
        <main class="main-content">
            <h1 id="pageTitle" style="font-weight: 800; margin-bottom: 10px;">Dashboard</h1>
            <p id="pageDesc" style="color: var(--secondary); margin-bottom: 30px;"></p>
            <div id="dynamicBoard" class="bento-grid"></div>
        </main>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient('https://lllrnkzhwudnfbrxciqb.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsbHJua3pod3VkbmZicnhjaXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTEwMzQsImV4cCI6MjA5MTU4NzAzNH0.MwuXJnxwJJtPejJmxQljwvEmmcOw9FzYa_5w7cKYSM0');

        async function authGate() {
            const id = document.getElementById('loginId').value;
            const { data, error } = await _supabase.from('profiles').select('*').eq('identificacion', id).single();
            if (error || !data) return alert("Usuario no encontrado");
            document.getElementById('loginView').classList.remove('active');
            document.getElementById('appContainer').style.display = 'flex';
            renderDashboard(data.rol, data.identificacion);
        }

        const views = {
            admin: {
                title: "Maestro Global", desc: "Aprobación de distribuidores.",
                menu: [{l: 'Dashboard', i: 'fa-chart-pie'}, {l: 'Distribuidores', i: 'fa-user-tie'}],
                content: '<div class="card span-2"><span class="stat-num">24</span><span class="stat-desc">Distribuidores</span></div><div class="card span-2"><span class="stat-num">12</span><span class="stat-desc">Pendientes</span></div>'
            },
            distribuidor: {
                title: "Panel Comercial", desc: "Gestión de colegios y cupos.",
                menu: [{l: 'Dashboard', i: 'fa-house'}, {l: 'Mis Colegios', i: 'fa-school'}],
                content: '<div class="card span-3"><span class="stat-num">08</span><span class="stat-desc">Colegios</span></div><div class="card span-3"><span class="stat-num">450</span><span class="stat-desc">Cupos</span></div>'
            },
            rector: {
                title: "Análisis Rectoría", desc: "Estadísticas del plantel.",
                menu: [{l: 'Resultados', i: 'fa-users'}, {l: 'Informes', i: 'fa-file-pdf'}],
                content: '<div class="card span-6"><h3>Tendencia del Colegio</h3><div style="height:15px; background:var(--accent); width:80%; margin-top:20px; border-radius:10px;"></div></div>'
            },
            estudiante: {
                title: "Test Vocacional", desc: "Pregunta 1 de 60.",
                menu: [{l: 'Mi Test', i: 'fa-clipboard-check'}],
                content: '<div class="card span-6"><h2>¿Te interesa la robótica?</h2><div style="display:flex; gap:10px; margin-top:20px;"><button class="btn-main">Sí</button><button class="btn-main" style="background:#eee; color:#333;">No</button></div></div>'
            }
        };

        function renderDashboard(role, id) {
            const d = views[role];
            document.getElementById('pageTitle').innerText = d.title;
            document.getElementById('pageDesc').innerText = d.desc;
            document.getElementById('dynamicBoard').innerHTML = d.content;
            const menu = document.getElementById('roleMenu');
            menu.innerHTML = "";
            d.menu.forEach(m => {
                menu.innerHTML += `<div class="nav-item"><i class="fa-solid ${m.i}"></i> ${m.l}</div>`;
            });
        }
    </script>
</body>
</html>
